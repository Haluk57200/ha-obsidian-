# ha-obsidian — Dashboard YAML
# Auteur : lookair (https://ko-fi.com/lookair)
# GitHub : https://github.com/Haluk57200/ha-obsidian-
#
# ══════════════════════════════════════════════════════════════
# ENTITÉS À ADAPTER À TON INSTALLATION
# Remplace les entités ci-dessous par les tiennes :
#
#   weather.forecast_maison       → ton entité météo
#   person.marc                   → ton entité person
#   person.francois               → autre entité person (si besoin)
#   calendar.marc                 → ton agenda Google/Caldav
#   light.salon                   → tes lumières
#   light.cuisine
#   light.chambre_parentale
#   light.chambre_enfant
#   light.chicago
#   light.bandeaux
#   light.espacedeloisirs1
#   climate.maison_zone_1         → ton thermostat
#   switch.sync_box_*             → ta Hue Sync Box (ou supprime)
#   media_player.denon_avr_*      → ton ampli AV (ou adapte)
#   media_player.cuisine_2        → ton player cuisine
#   media_player.maison           → ton player multiroom
#   media_player.android_tv_*     → ton Shield/Android TV
#   media_player.plex_*           → Plex (ou supprime)
#   sensor.solarmax_pac           → ton panneau solaire (ou supprime)
#   sensor.solarmax_kdy
#   sensor.system_monitor_*       → tes sensors système HA
#   input_select.mode_maison      → ton input_select mode maison
#   input_select.mode_media       → ton input_select mode média
#   input_boolean.portail_auto_actif
#   input_boolean.garage_auto_actif
#   input_boolean.mode_soiree
#   input_boolean.mode_film_enfant
#   input_boolean.ecole_de_main
#   input_text.tivimate_*         → tes helpers TiviMate (ou supprime)
#   input_text.tmdb_*             → tes helpers TMDB (ou supprime)
#   input_text.recherche_musique
#   input_select.lecteur_musique
#   input_select.type_de_recherche_musique
#   script.media_lancer_tidal     → tes scripts média (ou adapte)
#   script.media_radio_tidal
#   script.media_transferer_musique
#   sensor.dashboard_minute       → sensor virtuel pour rafraîchir la sidebar
#
# ══════════════════════════════════════════════════════════════
# DÉPENDANCES HACS REQUISES
#   - custom:button-card
#   - custom:layout-card (grid-layout)
#   - custom:mini-graph-card
#   - custom:media-premium-player-v9-4-1
#   - card-mod
# ══════════════════════════════════════════════════════════════

title: ha-obsidian
button_card_templates:
  mattiassectiontitle:
    show_icon: false
    show_name: true
    show_label: true
    styles:
      card:
        - background: none
        - box-shadow: none
        - border: none
        - padding: 0 0 9px 5px
        - height: auto
      name:
        - color: rgba(255,255,255,0.98)
        - font-size: 24px
        - font-weight: 900
        - letter-spacing: '-1px'
        - justify-self: start
        - text-shadow: 0 2px 18px rgba(0,0,0,0.55)
      label:
        - color: rgba(255,255,255,0.48)
        - font-size: 10px
        - font-weight: 800
        - letter-spacing: 1.45px
        - text-transform: uppercase
        - justify-self: start
        - margin-top: 2px

  mattiastile:
    show_icon: true
    show_name: true
    show_label: true
    label: |
      [[[
        if (!entity) return 'Indisponible';
        const s = entity.state;
        if (['on','playing','home'].includes(s)) return 'Activé';
        if (s === 'off') return 'Désactivé';
        if (s === 'idle') return 'Au repos';
        if (s === 'paused') return 'Pause';
        if (s === 'unavailable') return 'Indispo';
        if (s === 'unknown') return 'Inconnu';
        return s.charAt(0).toUpperCase() + s.slice(1);
      ]]]
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    styles:
      card:
        - position: relative
        - height: 104px
        - border-radius: 23px
        - padding: 16px
        - overflow: hidden
        - background: >-
            linear-gradient(145deg,rgba(255,255,255,0.06)
            0%,rgba(255,255,255,0.03) 47%,rgba(255,255,255,0.015) 100%)
        - border: 1px solid rgba(255,255,255,0.07)
        - box-shadow: >
            inset 0 1px 0 rgba(255,255,255,0.10), 0 2px 6px rgba(0,0,0,0.18), 0
            8px 20px rgba(0,0,0,0.28)
        - transition: transform 0.18s cubic-bezier(.25,.46,.45,.94),box-shadow 0.18s ease
      grid:
        - position: relative
        - z-index: 2
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: 1fr 1fr
        - column-gap: 11px
        - align-items: center
      icon:
        - width: 23px
        - color: >-
            [[[ return variables.iconcolor ? `#${variables.iconcolor}55` :
            'rgba(255,255,255,0.30)' ]]]
        - filter: none
      img_cell:
        - width: 40px
        - height: 40px
        - border-radius: 50%
        - background: rgba(255,255,255,0.05)
        - align-self: center
        - justify-self: center
      name:
        - justify-self: start
        - align-self: end
        - color: rgba(255,255,255,0.50)
        - font-size: 12px
        - font-weight: 900
        - line-height: 13px
        - text-shadow: none
      label:
        - justify-self: start
        - align-self: start
        - color: rgba(255,255,255,0.28)
        - font-size: 10.2px
        - font-weight: 800
        - line-height: 12px
    state:
      - operator: template
        value: >-
          [[[ return !entity ? false :
          ['on','playing','home'].includes(entity.state) ]]]
        styles:
          card:
            - background: >
                radial-gradient(ellipse at 18%
                10%,rgba(255,255,255,0.10),transparent 52%),
                linear-gradient(145deg,rgba(255,255,255,0.15)
                0%,rgba(255,255,255,0.08) 46%,rgba(255,255,255,0.04) 100%)
            - border: 1px solid rgba(255,255,255,0.30)
            - box-shadow: >
                inset 0 1px 0 rgba(255,255,255,0.30), 0 4px 8px
                rgba(0,0,0,0.14), 0 12px 32px rgba(0,0,0,0.26), 0 0 0 1px
                rgba(255,255,255,0.08)
            - backdrop-filter: blur(14px) saturate(160%)
            - '-webkit-backdrop-filter': blur(14px) saturate(160%)
          name:
            - color: rgba(255,255,255,1)
            - text-shadow: 0 2px 12px rgba(0,0,0,0.45)
          label:
            - color: rgba(255,255,255,0.72)
          icon:
            - color: >-
                [[[ return variables.iconcoloractive ?
                `#${variables.iconcoloractive}` : variables.iconcolor ?
                `#${variables.iconcolor}` : 'rgba(255,255,255,0.95)' ]]]
            - filter: |
                [[[
                  const c = variables.iconcoloractive || variables.iconcolor || 'fff';
                  return `drop-shadow(0 0 14px #${c}DD)`;
                ]]]
          img_cell:
            - background: >-
                [[[ return variables.iconbgactive || variables.iconbg ||
                'rgba(255,255,255,0.14)' ]]]
    extra_styles: |
      @keyframes pulse-on {
        0%   { transform: scale(1);    box-shadow: inset 0 1px 0 rgba(255,255,255,.30), 0 0 0 0 rgba(var(--pulse-rgb,255,255,255), .5); }
        40%  { transform: scale(1.03); box-shadow: inset 0 1px 0 rgba(255,255,255,.30), 0 0 0 14px rgba(var(--pulse-rgb,255,255,255), .0); }
        100% { transform: scale(1);    box-shadow: inset 0 1px 0 rgba(255,255,255,.30), 0 0 0 0 rgba(var(--pulse-rgb,255,255,255), 0); }
      }
      @keyframes icon-glow-pulse {
        0%   { filter: drop-shadow(0 0 0 transparent); }
        45%  { filter: drop-shadow(0 0 18px var(--icon-glow,#fff)); }
        100% { filter: drop-shadow(0 0 8px var(--icon-glow,#fff)); }
      }
      .card::after {
        content:''; position:absolute; top:-66%; left:-90%;
        width:52%; height:232%;
        background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
        opacity:.28; pointer-events:none; z-index:1;
        transform:rotate(28deg) translateX(0);
        transition:transform .65s cubic-bezier(.25,.46,.45,.94);
        will-change:transform;
      }
      .card:hover { transform:translateY(-2px) scale(1.008); }
      .card:hover::after { transform:rotate(28deg) translateX(420%); }
      .card:active { transform:scale(0.962) translateY(1px) !important; }

  mattiaslighttile:
    template: mattiastile
    tap_action:
      action: more-info
    hold_action:
      action: toggle
    label: |
      [[[
        if (!entity) return 'Indisponible';
        if (entity.state === 'off') return 'Éteint';
        if (entity.state === 'unavailable') return 'Indispo';
        const b = entity.attributes?.brightness;
        if (b !== undefined && b !== null) {
          return Math.round(b / 2.55) + '%';
        }
        return 'Allumé';
      ]]]
    state:
      - operator: template
        value: >-
          [[[ return !entity ? false :
          ['on','playing','home'].includes(entity.state) ]]]
        styles:
          card:
            - '--pulse-rgb': >-
                [[[ const c = variables.iconcoloractive || variables.iconcolor
                || 'fff';
                    const m = c.match(/.{2}/g); return m ? `${parseInt(m[0],16)},${parseInt(m[1],16)},${parseInt(m[2],16)}` : '255,255,255'; ]]]
            - animation: pulse-on 0.75s cubic-bezier(.25,.46,.45,.94)
          icon:
            - '--icon-glow': >-
                [[[ return '#' + (variables.iconcoloractive ||
                variables.iconcolor || 'fff'); ]]]
            - animation: icon-glow-pulse 0.75s ease-out forwards

  mattiasclimatetile:
    template: mattiastile
    tap_action:
      action: more-info
    hold_action:
      action: none
    label: |
      [[[
        if (!entity) return 'Indispo';
        const cur = entity.attributes?.current_temperature;
        const tgt = entity.attributes?.temperature;
        const t = (cur != null) ? cur : (tgt != null ? tgt : null);
        if (t == null) return 'Indispo';
        let mood;
        if      (t < 17)  mood = 'Frais';
        else if (t < 21)  mood = 'Confort';
        else if (t < 24)  mood = 'Tempéré';
        else              mood = 'Chaud';
        const tStr = (Math.round(t*10)/10).toFixed(1) + '°C';
        return tStr + ' · ' + mood;
      ]]]

  mattiasscenetile:
    template: mattiastile
    label: Scène
    tap_action:
      action: call-service
      service: scene.turn_on
      target:
        entity_id: '[[[ return entity.entity_id ]]]'

  mattiasscripttile:
    template: mattiastile
    label: Action
    tap_action:
      action: call-service
      service: script.turn_on
      target:
        entity_id: '[[[ return entity.entity_id ]]]'

  mattiasbottomchip:
    template: mattiastile
    styles:
      card:
        - height: 44px
        - border-radius: 15px
        - padding: 5px 9px
        - background: >-
            linear-gradient(145deg,rgba(255,255,255,0.095),rgba(255,255,255,0.042))
        - border: 1px solid rgba(255,255,255,0.085)
        - box-shadow: inset 0 1px 0 rgba(255,255,255,0.13),0 4px 10px rgba(0,0,0,0.14)
      grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 27px 1fr
        - grid-template-rows: 1fr 1fr
        - column-gap: 8px
      img_cell:
        - width: 24px
        - height: 24px
      icon:
        - width: 15px
      name:
        - font-size: 10px
        - line-height: 11px
        - font-weight: 900
      label:
        - font-size: 9px
        - line-height: 10px
        - font-weight: 750

views:
  - title: ha-obsidian
    path: ha-obsidian
    icon: mdi:view-dashboard
    type: custom:grid-layout
    layout:
      grid-template-columns: 310px minmax(0,1fr)
      grid-template-rows: calc(100vh - 64px)
      grid-template-areas: '"sidebar main"'
      gap: 0px
      margin: 0px
      padding: 0px
      grid-gap: 0px
    card_mod:
      style: |
        :host {
          --clr-bg:
            radial-gradient(ellipse at 15% 12%, rgba(126,224,181,0.07) 0%, transparent 42%),
            radial-gradient(ellipse at 85% 10%, rgba(215,166,255,0.055) 0%, transparent 42%),
            radial-gradient(ellipse at 85% 88%, rgba(124,200,255,0.045) 0%, transparent 40%),
            radial-gradient(ellipse at 15% 88%, rgba(126,224,181,0.035) 0%, transparent 38%),
            linear-gradient(145deg,rgba(10,14,20,1) 0%,rgba(8,11,17,1) 35%,rgba(6,9,14,1) 65%,rgba(4,7,11,1) 100%);
          background: var(--clr-bg) !important;
          width: 100vw !important;
          min-height: 100vh !important;
        }
        hui-view { --clr-bg: none !important; }
        ha-more-info-dialog .mdc-dialog__scrim {
          background: rgba(4,7,12,0.55) !important;
        }
        .mdc-dialog .mdc-dialog__surface {
          background:
            radial-gradient(ellipse at 15% 12%, rgba(126,224,181,0.045) 0%, transparent 52%),
            radial-gradient(ellipse at 85% 88%, rgba(124,200,255,0.03) 0%, transparent 50%),
            linear-gradient(145deg, rgba(12,16,22,1) 0%, rgba(8,11,17,1) 60%, rgba(6,9,14,1) 100%) !important;
          border: 1px solid rgba(255,255,255,0.10) !important;
          border-radius: 32px !important;
          box-shadow:
            0 0 0 1px rgba(255,255,255,0.06),
            0 8px 32px rgba(0,0,0,0.40),
            0 32px 80px rgba(0,0,0,0.55),
            inset 0 1px 0 rgba(255,255,255,0.12),
            inset 0 -1px 0 rgba(0,0,0,0.30) !important;
          overflow: hidden !important;
        }
    cards:
      - type: vertical-stack
        view_layout:
          grid-area: sidebar
        card_mod:
          style: |
            :host {
              display: block !important;
              position: sticky !important;
              top: 0 !important;
              align-self: start !important;
              z-index: 8;
              height: calc(100vh - 64px) !important;
              max-height: calc(100vh - 64px) !important;
              width: 100%;
              padding: 28px 22px 18px 22px !important;
              background: transparent !important;
              box-shadow: none !important;
              border: none !important;
              outline: none !important;
              overflow-y: auto !important;
              overflow-x: hidden !important;
              box-sizing: border-box;
              scrollbar-width: none;
            }
            :host::-webkit-scrollbar { display: none; }
            .root { margin: 0 !important; padding: 0 !important; }
            .root > * { margin-bottom: 0 !important; }
            .root ha-card {
              background: none !important;
              border: none !important;
              box-shadow: none !important;
              border-radius: 0 !important;
            }
        cards:
          - type: custom:button-card
            show_icon: false
            show_name: false
            show_label: false
            entity: sensor.dashboard_minute
            tap_action:
              action: more-info
              entity: weather.forecast_maison
            styles:
              card:
                - background: none
                - border: none
                - box-shadow: none
                - border-radius: 0
                - padding: 0
              grid:
                - grid-template-areas: '"content"'
            custom_fields:
              content: |
                [[[
                  const d = new Date();
                  const heure = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
                  const jourStr = d.toLocaleDateString('fr-FR',{weekday:'long'});
                  const dateStr = d.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
                  const sem = Math.ceil((d - new Date(d.getFullYear(),0,1)) / 86400000 / 7);
                  const h = d.getHours();
                  const hello = h<6?'Bonne nuit 🌙':h<12?'Bonjour ☀️':h<18?'Bonne journée 🌤️':h<22?'Bonsoir 🌆':'Bonne nuit 🌙';
                  const w = states['weather.forecast_maison'];
                  const wa = w?.attributes || {};
                  const temp = wa.temperature ?? '—';
                  const cond = w?.state ?? '';
                  const hum  = wa.humidity;
                  const wind = wa.wind_speed;
                  const press= wa.pressure;
                  const cmap = {sunny:'Ensoleillé',clear:'Dégagé','clear-night':'Nuit claire',cloudy:'Nuageux','partly-cloudy':'Éclaircies',rainy:'Pluie',pouring:'Forte pluie',snowy:'Neige',fog:'Brouillard',windy:'Vent',lightning:'Orage'};
                  const condText = cmap[cond] || cond;
                  const wIcon = cond.includes('sun')||cond.includes('clear')?'☀️':cond.includes('rain')||cond.includes('pour')?'🌧️':cond.includes('snow')?'❄️':cond.includes('fog')?'🌫️':'⛅';
                  const lights = ['light.salon','light.chicago','light.cuisine','light.chambre_parentale','light.chambre_enfant','light.espacedeloisirs1','light.bandeaux'];
                  const nbOn = lights.filter(e => states[e]?.state === 'on').length;
                  const presence = states['person.haluk']?.state;
                  const presText = presence === 'home' ? 'Haluk · Maison' : presence ? 'Haluk · ' + presence : '';
                  const modeM = states['input_select.mode_maison']?.state;
                  const div = `<div style="height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.09),rgba(255,255,255,0.03),transparent);margin:14px 0"></div>`;
                  return `<div style="color:white">
                    <div style="font-size:68px;font-weight:100;letter-spacing:-5px;line-height:1;color:rgba(255,255,255,0.97)">${heure}</div>
                    <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.36);text-transform:capitalize;margin-top:5px">${jourStr}<br>${dateStr}</div>
                    <div style="font-size:10.5px;font-weight:700;color:rgba(255,255,255,0.20);margin-top:2px">Semaine ${sem}</div>
                    <div style="font-size:17px;font-weight:800;color:rgba(255,255,255,0.88)">${hello}</div>
                    ${nbOn > 0 ? `<div style="font-size:11.5px;font-weight:700;color:rgba(255,255,255,0.34);margin-top:4px">${nbOn} lumière${nbOn>1?'s':''} allumée${nbOn>1?'s':''}</div>` : ''}
                    ${presText ? `<div style="font-size:11.5px;font-weight:700;color:rgba(126,224,181,0.58);margin-top:2px">${presText}</div>` : ''}
                    ${modeM ? `<div style="font-size:10.5px;font-weight:700;color:rgba(255,255,255,0.22);margin-top:2px;text-transform:capitalize">${modeM}</div>` : ''}
                    ${div}
                    <div style="font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.26);margin-bottom:7px">Météo</div>
                    <div style="display:flex;align-items:flex-start;justify-content:space-between">
                      <div>
                        <div style="font-size:24px;font-weight:800;color:rgba(255,255,255,0.94)">${temp}°</div>
                        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.32);margin-top:2px">${condText}</div>
                      </div>
                      <div style="font-size:28px;margin-top:2px">${wIcon}</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:10.5px;font-weight:700">
                      ${hum  != null ? `<span style="color:rgba(124,200,255,.70)">💧 ${hum}%</span>` : ''}
                      ${wind != null ? `<span style="color:rgba(126,224,181,.70)">💨 ${Math.round(wind)} km/h</span>` : ''}
                      ${press!= null ? `<span style="color:rgba(215,166,255,.70)">📊 ${Math.round(press)} hPa</span>` : ''}
                    </div>
                  </div>`;
                ]]]
            card_mod:
              style: >-
                ha-card { background:none!important; border:none!important;
                box-shadow:none!important; }

          - type: custom:button-card
            show_icon: false
            show_name: false
            show_label: false
            entity: calendar.haluk
            tap_action:
              action: more-info
            styles:
              card:
                - background: none
                - border: none
                - box-shadow: none
                - border-radius: 0
                - padding: 8px 0 0 0
              grid:
                - grid-template-areas: '"content"'
            custom_fields:
              content: |
                [[[
                  const cal = states['calendar.haluk'];
                  const evtMsg = cal?.attributes?.message;
                  const evtStart = cal?.attributes?.start_time;
                  let evtDate, evtTime;
                  if (evtMsg && evtStart) {
                    const ed = new Date(evtStart);
                    evtDate = ed.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'});
                    evtTime = ed.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
                  }
                  const div = `<div style="height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.09),rgba(255,255,255,0.03),transparent);margin:14px 0"></div>`;
                  return `<div style="color:white">
                    ${div}
                    <div style="font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.26);margin-bottom:7px">Agenda</div>
                    <div style="font-size:13px;font-weight:800;color:rgba(255,255,255,0.86)">${evtMsg || 'Aucun évènement'}</div>
                    ${evtMsg ? `<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.30);margin-top:3px">${evtDate} ${evtTime}</div>` : ''}
                  </div>`;
                ]]]
            card_mod:
              style: >-
                ha-card { background:none!important; border:none!important;
                box-shadow:none!important; }

          - type: custom:button-card
            show_icon: false
            show_name: false
            show_label: false
            entity: sensor.system_monitor_utilisation_du_processeur
            tap_action:
              action: more-info
            styles:
              card:
                - background: none
                - border: none
                - box-shadow: none
                - border-radius: 0
                - padding: 8px 0 0 0
              grid:
                - grid-template-areas: '"content"'
            custom_fields:
              content: |
                [[[
                  const cpu = parseFloat(states['sensor.system_monitor_utilisation_du_processeur']?.state ?? 0) || 0;
                  const ram = parseFloat(states['sensor.system_monitor_utilisation_de_la_memoire']?.state ?? 0) || 0;
                  const cpuC = cpu>80?'#ff6b6b':cpu>50?'#f6d865':'#7ee0b5';
                  const ramC = ram>85?'#ff6b6b':ram>65?'#f6d865':'#7cc8ff';
                  const bar = (val,color,lbl) => `<div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">
                    <span style="font-size:11px;font-weight:900;color:${color};min-width:68px">${lbl}</span>
                    <div style="flex:1;height:2px;border-radius:99px;background:rgba(255,255,255,0.06)">
                      <div style="height:100%;width:${Math.min(val,100)}%;background:${color};border-radius:99px"></div>
                    </div>
                  </div>`;
                  const div = `<div style="height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.09),rgba(255,255,255,0.03),transparent);margin:14px 0"></div>`;
                  return `<div style="color:white">
                    ${div}
                    <div style="font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.26);margin-bottom:9px">Système</div>
                    ${bar(cpu,cpuC,'CPU ' + Math.round(cpu) + '%')}
                    ${bar(ram,ramC,'RAM ' + Math.round(ram) + '%')}
                  </div>`;
                ]]]
            card_mod:
              style: >-
                ha-card { background:none!important; border:none!important;
                box-shadow:none!important; }

          - type: custom:button-card
            show_icon: false
            show_name: false
            show_label: false
            entity: sensor.solarmax_pac
            tap_action:
              action: more-info
            styles:
              card:
                - background: none
                - border: none
                - box-shadow: none
                - border-radius: 0
                - padding: 8px 0 0 0
              grid:
                - grid-template-areas: '"content"'
            custom_fields:
              content: |
                [[[
                  const pac = parseFloat(states['sensor.solarmax_pac']?.state) || 0;
                  const kdy = parseFloat(states['sensor.solarmax_kdy']?.state);
                  const kwhTxt = Number.isFinite(kdy) ? kdy.toFixed(1) + ' kWh' : '0 kWh';
                  const solMsg = pac>2000?'Production forte':pac>800?'Production active':pac>0?'Faible luminosité':'Aucune production';
                  const div = `<div style="height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.09),rgba(255,255,255,0.03),transparent);margin:14px 0"></div>`;
                  return `<div style="color:white">
                    ${div}
                    <div style="font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.26);margin-bottom:7px">Puissance solaire</div>
                    <div style="display:flex;align-items:flex-end;justify-content:space-between">
                      <div>
                        <div style="font-size:28px;font-weight:800;color:rgba(255,255,255,0.94)">${Math.round(pac)} W</div>
                        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.28);margin-top:3px">${solMsg} · ${kwhTxt}</div>
                      </div>
                      <div style="font-size:22px">${pac>0?'☀️':''}</div>
                    </div>
                  </div>`;
                ]]]
            card_mod:
              style: >-
                ha-card { background:none!important; border:none!important;
                box-shadow:none!important; }

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.solarmax_pac
                name: Solaire
                color: rgba(255,255,255,0.42)
            hours_to_show: 24
            points_per_hour: 2
            line_width: 1.6
            height: 60
            decimals: 0
            show:
              icon: false
              name: false
              state: false
              labels: false
              legend: false
              fill: fade
              points: false
            card_mod:
              style: |
                ha-card {
                  background:none!important;
                  border:none!important;
                  box-shadow:none!important;
                  padding:6px 0 0!important;
                  margin:0!important;
                }

